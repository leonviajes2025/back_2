name: API Docs Sync

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-api-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify generated API docs artifacts
        run: npm run check:api-docs

      - name: Lint project
        run: npm run lint